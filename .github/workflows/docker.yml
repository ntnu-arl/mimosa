name: Build CI Base Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/docker/**'

env:
  REGISTRY: ghcr.io

jobs:
  build-ros1-noetic:
    name: ROS1 Noetic Base (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .github/docker
          file: .github/docker/ci-base.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ci-base:${{ matrix.arch }}
          cache-from: type=gha,scope=ci-base-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-base-${{ matrix.arch }}

  build-ros2:
    name: ROS2 ${{ matrix.distro }} Base (${{ matrix.arch }})
    strategy:
      matrix:
        distro: [humble, jazzy, rolling]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .github/docker
          file: .github/docker/ci-base-ros2.Dockerfile
          build-args: ROS_DISTRO=${{ matrix.distro }}
          push: true
          tags: ghcr.io/${{ github.repository }}/ci-base-ros2-${{ matrix.distro }}:${{ matrix.arch }}
          cache-from: type=gha,scope=ci-base-ros2-${{ matrix.distro }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-base-ros2-${{ matrix.distro }}-${{ matrix.arch }}
