name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  build-ros1-noetic:
    name: ROS1 Noetic (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/${{ github.repository }}/ci-base:${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link into catkin workspace
        run: ln -s "$GITHUB_WORKSPACE" /catkin_ws/src/mimosa

      - name: Build mimosa
        shell: bash
        run: |
          cd /catkin_ws
          . devel/setup.bash
          catkin build mimosa --no-status --force-color

  build-ros2:
    name: ROS2 ${{ matrix.distro }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        distro: [humble, jazzy]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/${{ github.repository }}/ci-base-ros2-${{ matrix.distro }}:${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link into colcon workspace
        run: ln -s "$GITHUB_WORKSPACE" /colcon_ws/src/mimosa

      - name: Build mimosa
        shell: bash
        run: |
          cd /colcon_ws
          . install/setup.bash
          colcon build --packages-up-to mimosa --event-handlers console_cohesion+
